<!DOCTYPE html>

<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href="https://cdn.bootcss.com/aplayer/1.10.1/APlayer.min.css" rel="stylesheet">
	<script src="https://cdn.bootcss.com/aplayer/1.10.1/APlayer.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
	<style>
		.demo{100%;margin:60px auto 10px auto}
		.demo p{padding:10px 0}
	</style>
	
</head>
<body>
	<div class="demo">
		<p><strong>音乐播放器</strong></p>
		<div id="player1">

		</div>
	</div>
	<script>
		var ap;
		$(document).ready(function(){
          htmlobj=$.ajax({url:"/backward/getFileList",async:false});
		  var musicList = [];
          htmlobj.responseJSON.list.forEach(function(element){
			let id = element.id;
			let array = {
				"title":element.name,
				"author":"",
				"url":"http://192.168.123.133:8082/backward/getMusicFile/"+id,
				"pic":"",
				"lrc":""
		  };
		  console.log(array);
		  musicList.push(array);
		  });
		 ap = new APlayer
		 ({
		 	element: document.getElementById('player1'),
		 	narrow: false,
		 	autoplay: false,
		 	showlrc: true,
             preload: 'none',
             lrcType: 3,
		 	audio: musicList
		 });
        });
	</script>
</body>
